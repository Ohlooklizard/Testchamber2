<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Chamber 2</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("background1.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    .title {
      position: fixed;
      top: 18px;
      left: 24px;
      z-index: 50;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 0 8px black, 0 0 14px black;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

   .grid-container {
  display: grid;
  grid-template-columns: repeat(5, 145px);
  gap: 0;
  background: black;
  border: 6px solid black;
  box-shadow: 0 0 18px rgba(0, 0, 0, 0.85);
}

.grid-slot {
  width: 145px;
  height: 700px;
  border: 3px solid black;
  position: relative;
  overflow: hidden;
  background: rgba(0, 0, 0, 0.65);
}

.photo-wrapper {
  width: 145px;
  height: auto;
  cursor: grab;
  position: absolute;
  top: -175px;
  left: 0;
}

.photo-wrapper img {
  width: 145px;
  height: auto;
  object-fit: contain;
  pointer-events: none;
  user-select: none;
  display: block;
}
    
.slide-controls {
  display: none;
}

.slide-controls input {
  width: 100%;
  cursor: pointer;
}

    .answer-box {
      text-align: center;
      text-shadow: 0 2px 4px black;
    }

    .answer-box label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 18px;
    }

    .answer-box input {
      padding: 6px;
      font-size: 15px;
      width: 175px;
    }

    .answer-box button {
      padding: 6px 10px;
      font-size: 15px;
      cursor: pointer;
    }

    .hand-button {
      position: fixed;
      bottom: 20%;
      left: 35px;
      transform: translateY(-50%);
      width: 60px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }

    .glados-button {
      position: fixed;
      top: 35px;
      left: 40px;
      width: 220px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }

    .bug-button {
      position: fixed;
      bottom: 30%;
      right: 40px;
      width: 45px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }

    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      cursor: pointer;
    }

    #loadingScreen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <div id="loadingScreen" onclick="closeLoadingScreen()">
    <img src="loading.jpg" alt="Loading Screen">
  </div>

  <div class="title">Test Chamber 2</div>

  <audio id="gladosAudio" src="glados.mp3"></audio>
  <audio id="bestdogAudio" src="bestdog.mp3" loop></audio>
  <audio id="bugAudio" src="bug.mp3"></audio>
  <audio id="wrong1Audio" src="wrong1.mp3"></audio>
  <audio id="wrong2Audio" src="wrong2.mp3"></audio>

  <img id="gladosButton" src="glados.png" alt="GLaDOS Button" class="glados-button">
  <img id="bugButton" src="bug.png" alt="Bug Button" class="bug-button">
  <img id="handButton" src="hand.jpg" alt="Hand Button" class="hand-button">

  <div class="page">
   
<div class="grid-container">

  <div class="grid-slot">
    <div class="photo-wrapper" draggable="true" id="panel1" data-y="-175">
      <img src="panel1.jpg" alt="Panel 1">
      <div class="slide-controls">
      <input type="range" min="-650" max="350" value="-175" step="1" oninput="slidePanel(this)">
      </div>
    </div>
  </div>

  <div class="grid-slot">
    <div class="photo-wrapper" draggable="true" id="panel2" data-y="-175">
      <img src="panel2.jpg" alt="Panel 2">
      <div class="slide-controls">
      <input type="range" min="-650" max="350" value="-175" step="1" oninput="slidePanel(this)">
      </div>
    </div>
  </div>

  <div class="grid-slot">
    <div class="photo-wrapper" draggable="true" id="panel3" data-y="-175">
      <img src="panel3.jpg" alt="Panel 3">
      <div class="slide-controls">
      <input type="range" min="-650" max="350" value="-175" step="1" oninput="slidePanel(this)">
      </div>
    </div>
  </div>

  <div class="grid-slot">
    <div class="photo-wrapper" draggable="true" id="panel4" data-y="-175">
      <img src="panel4.jpg" alt="Panel 4">
      <div class="slide-controls">
      <input type="range" min="-650" max="350" value="-175" step="1" oninput="slidePanel(this)">
      </div>
    </div>
  </div>

  <div class="grid-slot">
    <div class="photo-wrapper" draggable="true" id="panel5" data-y="-175">
      <img src="panel5.jpg" alt="Panel 5">
      <div class="slide-controls">
      <input type="range" min="-650" max="350" value="-175" step="1" oninput="slidePanel(this)">
      </div>
    </div>
  </div>

</div>

    <form id="codeForm" class="answer-box">
      <label for="codeInput">What's the hidden word?</label>
      <input type="text" id="codeInput" placeholder="????" autocomplete="off" required>
      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    let draggedElement = null;
    let wrongToggle = 1;
    let backgroundToggle = 1;

    const bestdogAudio = document.getElementById("bestdogAudio");

    function startBestdogAudio() {
      bestdogAudio.volume = 0.35;
      bestdogAudio.play().catch(() => {});
    }

    window.addEventListener("load", startBestdogAudio);

    ["click", "keydown"].forEach(eventName => {
      document.addEventListener(eventName, startBestdogAudio, { once: true });
    });

    document.querySelectorAll(".photo-wrapper").forEach(wrapper => {
      wrapper.addEventListener("dragstart", event => {
        draggedElement = wrapper;
        event.dataTransfer.setData("text/plain", wrapper.id);
      });
    });

    document.querySelectorAll(".grid-slot").forEach(slot => {
      slot.addEventListener("dragover", event => event.preventDefault());

      slot.addEventListener("drop", event => {
        event.preventDefault();

        if (!draggedElement) return;

        const currentOccupant = slot.querySelector(".photo-wrapper");
        const originalSlot = draggedElement.parentElement;

        if (currentOccupant && currentOccupant !== draggedElement) {
          originalSlot.appendChild(currentOccupant);
        }

        slot.appendChild(draggedElement);
      });
    });

function slidePanel(slider) {
  const wrapper = slider.closest(".photo-wrapper");
  const currentY = Number(slider.value);

  wrapper.dataset.y = currentY;
  wrapper.style.top = currentY + "px";
}
    
    document.getElementById("codeForm").addEventListener("submit", event => {
      event.preventDefault();

      const userInput = document.getElementById("codeInput").value.trim().toLowerCase();

      if (userInput === "cake") {
        window.location.href = "https://ohlooklizard.github.io/testchamber3/";
      } else {
        const wrongAudio = document.getElementById(
          wrongToggle === 1 ? "wrong1Audio" : "wrong2Audio"
        );

        wrongAudio.currentTime = 0;
        wrongAudio.play();

        wrongToggle = wrongToggle === 1 ? 2 : 1;
      }
    });

    document.getElementById("bugButton").addEventListener("click", () => {
      const bugAudio = document.getElementById("bugAudio");
      bugAudio.currentTime = 0;
      bugAudio.play();
    });

    document.getElementById("gladosButton").addEventListener("click", () => {
      const gladosAudio = document.getElementById("gladosAudio");
      gladosAudio.currentTime = 0;
      gladosAudio.play();
    });

    document.getElementById("handButton").addEventListener("click", () => {
      backgroundToggle = backgroundToggle === 1 ? 2 : 1;
      document.body.style.backgroundImage = `url("background${backgroundToggle}.jpg")`;
    });

  document.querySelectorAll(".photo-wrapper").forEach(wrapper => {
  wrapper.addEventListener("wheel", event => {
    event.preventDefault();

    let currentY = Number(wrapper.dataset.y);

    currentY += Math.sign(event.deltaY) * 0.10;

    if (currentY > 350) currentY = 350;
    if (currentY < -650) currentY = -650;

    wrapper.dataset.y = currentY;
    wrapper.style.top = currentY + "px";

    const slider = wrapper.querySelector("input[type='range']");
    if (slider) {
      slider.value = currentY;
    }
  });
});
    
    function closeLoadingScreen() {
      document.getElementById("loadingScreen").style.display = "none";
      startBestdogAudio();
    }
  </script>
</body>
</html>
